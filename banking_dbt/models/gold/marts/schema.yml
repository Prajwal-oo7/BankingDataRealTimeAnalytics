version: 2

models:

  - name: customer_summary

    description: >
      Business-ready mart providing customer level KPIs such as
      total accounts, transaction count, transaction amount and
      current balance.

    config:
      tags:
        - mart

      meta:
        owner: Data Engineering Team

    columns:

      - name: customer_id
        tests:
          - unique
          - not_null

      - name: total_accounts
        tests:
          - not_null

      - name: current_total_balance
        tests:
          - not_null

      - name: total_transactions
        tests:
          - not_null


  - name: account_summary
    description: >
      Account-level reporting mart used by business users
      to analyze balances and transaction activity..

    config:
      tags:
        - mart

      meta:
        owner: Data Engineering Team

    columns:

      - name: account_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: balance
        tests:
          - not_null


  - name: fraud_monitoring
    description: >
      Near real-time fraud monitoring mart identifying suspicious
      banking transactions based on configurable business rules.

    config:
      tags:
        - mart

      meta:
        owner: Data Engineering Team

    columns:

      - name: transaction_id
        tests:
          - unique
          - not_null

      - name: fraud_flag
        tests:
          - accepted_values:
              arguments:
                values:
                  - NORMAL
                  - SUSPICIOUS
                  - HIGH_RISK