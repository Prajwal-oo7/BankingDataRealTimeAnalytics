name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main

jobs:

  validate:

    runs-on: ubuntu-latest

    # services:
    #   postgres:
    #     image: postgres:15
    #     env:
    #       POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
    #       POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    #       POSTGRES_DB: banking
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure dbt Profile
        run: |
          mkdir -p ~/.dbt

          cat > ~/.dbt/profiles.yml <<EOF
          banking_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: SILVER
                threads: 4
                client_session_keep_alive: False
          EOF

      - name: Install dbt Packages
        working-directory: banking_dbt
        run: dbt deps

      - name: Parse dbt Project
        working-directory: banking_dbt
        run: dbt parse

      - name: SQL Lint (SQLFluff)
        run: |
          sqlfluff lint banking_dbt/models

      - name: Python Lint (Ruff)
        run: |
          ruff check .

      - name: Run Python Tests
        run: |
          pytest tests/ || echo "No tests found."

      - name: Validate Airflow DAG Syntax
        run: |
          find docker/dags -name "*.py" -exec python -m py_compile {} \;

      - name: Compile dbt Project
        working-directory: banking_dbt
        run: dbt compile