name: Continuous Deployment

on:
  # push:
  #   branches: [ main ]   # deploy only from main

  workflow_dispatch:      # cd runs when manually click run wrokflow

jobs:

  deploy:

    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production
      cancel-in-progress: true

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure dbt Profile
        run: |
          mkdir -p ~/.dbt

          cat > ~/.dbt/profiles.yml <<EOF

          banking_dbt:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: SILVER
                threads: 4
          EOF

    # Deploy DBt Project
      - name: Install Packages
        working-directory: banking_dbt          #or cd banking_dbt
        run: |
          dbt deps
          dbt test
        # validates production data

      - name: Deploy Models
        working-directory: banking_dbt
        run: dbt build
        # builds production models on Snowflake

      - name: Generate Documentation
        working-directory: banking_dbt
        run: dbt docs generate